<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | The Gypsy Cartel</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FDFBF7; padding: 20px; }
        .nav { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border: 1px solid #C5A059; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Founder's Dashboard</h1>
    
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
        <button onclick="showSection('settings')">Settings</button>
    </div>

    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <!-- ഫോം ഇവിടെ വരും -->
    </div>

    <div id="history" class="card" style="display:none;">
        <h2>Transaction History</h2>
        <!-- ഫിൽറ്റർ ടേബിൾ ഇവിടെ വരും -->
    </div>

    <div id="settings" class="card" style="display:none;">
        <h2>Settings</h2>
        <!-- കാറ്റഗറി മാനേജ്‌മെന്റ് ഇവിടെ വരും -->
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>

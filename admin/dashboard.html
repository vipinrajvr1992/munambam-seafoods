<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Munambam Seafoods</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Premium Navigation -->
    <div class="nav">
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('add-new')">Add Transaction</button>
        <button onclick="refreshDashboard()" style="margin-left: auto;">Sync Data</button>
    </div>

    <!-- MAIN DASHBOARD SECTION -->
    <div id="section-dashboard" class="container section">
        <div class="card">
            <h2 style="margin-top:0;">Financial Overview</h2>
            <div style="display: flex; gap: 20px; justify-content: space-between; flex-wrap: wrap; margin-top: 20px;">
                <div class="summary-box">
                    <p>Total Income</p>
                    <h3 id="totalIncome" style="color: #2ecc71;">₹ 0.00</h3>
                </div>
                <div class="summary-box">
                    <p>Total Expense</p>
                    <h3 id="totalExpense" style="color: #e74c3c;">₹ 0.00</h3>
                </div>
                <div class="summary-box">
                    <p>Net Balance</p>
                    <h3 id="netProfit" style="color: var(--navy-blue);">₹ 0.00</h3>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">Recent Transactions (<span id="recordCount">0</span>)</h3>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Item</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ADD TRANSACTION SECTION -->
    <div id="section-add-new" class="container section hidden">
        <div class="card" style="max-width: 600px;">
            <h2>Add New Entry</h2>
            
            <label for="date">Date</label>
            <input type="date" id="date">

            <label for="type">Transaction Type</label>
            <select id="type">
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>

            <label for="categorySelect">Category</label>
            <select id="categorySelect">
                <option value="">Select Category</option>
            </select>

            <label for="itemSelect">Item</label>
            <select id="itemSelect">
                <option value="">Select Item</option>
            </select>

            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" placeholder="Enter amount">

            <label for="notes">Notes / Description</label>
            <input type="text" id="notes" placeholder="Optional details">

            <button onclick="saveTransaction()" class="btn-primary" style="width: 100%; margin-top: 10px;">Save Transaction</button>
        </div>
    </div>

    <!-- SCREEN LOADER -->
    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER (Custom Yellow-Red error compatible) -->
    <div id="toast" style="display: none;"></div>

    <!-- 1. CUSTOM EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content-confirm">
            <h3 style="margin-top: 0; color: var(--navy-blue);">Edit Amount</h3>
            <p style="color: #666; font-size: 13px; margin-bottom: 15px;">Modify transaction amount below:</p>
            <input type="number" id="editAmountInput" placeholder="Enter New Amount" style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button onclick="closeEditModal()" class="btn-cancel">Cancel</button>
                <button onclick="saveEditAmount()" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- 2. CUSTOM CONFIRMATION MODAL -->
    <div id="confirmModal" class="modal">
        <div class="modal-content-confirm">
            <h3 style="margin-top: 0; color: var(--navy-blue);">Confirmation Needed</h3>
            <p id="confirmMessage" style="margin-bottom: 25px; color: #555; font-size: 14px;"></p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button id="confirmCancelBtn" class="btn-cancel">No, Cancel</button>
                <button id="confirmYesBtn" class="btn-primary">Yes, Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Simple section switching logic
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Founder's Dashboard | The Gypsy Cartel</title>
    <style>
        :root { --navy-blue: #0B243B; --gold: #C5A059; --cream: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: var(--navy-blue); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .card { background: white; padding: 20px; border: 1px solid var(--gold); border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        #status { font-weight: bold; color: var(--navy-blue); margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <h1>Founder's Dashboard</h1>
    <div id="status"></div>
    
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
        <button onclick="showSection('settings')">Settings</button>
    </div>

    <!-- Transaction Section -->
    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <input type="date" id="date">
        <select id="type"><option value="Income">Income</option><option value="Expense">Expense</option></select>
        <select id="categorySelect"></select>
        <select id="itemSelect"></select>
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="saveData()">Save Transaction</button>
    </div>

    <!-- History Section -->
    <div id="history" class="card hidden">
        <h2>Transaction History <button onclick="loadData()">Refresh</button></h2>
        <table id="historyTable">
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th></tr>
        </table>
    </div>

    <!-- Settings Section -->
    <div id="settings" class="card hidden">
        <h2>Settings</h2>
        <p>Manage Categories and Products here.</p>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwfzRxGkq2pDcgCAp6EKTJx7n_Y2g-vtWgEpJ00p2WlD_NCCJPj3vDY4U3K8q01rdrN/exec";

        // Initial load
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                let catSelect = document.getElementById("categorySelect");
                let itemSelect = document.getElementById("itemSelect");
                data.settings.forEach(row => {
                    if(row[0]) catSelect.innerHTML += `<option value="${row[0]}">${row[0]}</option>`;
                    if(row[1]) itemSelect.innerHTML += `<option value="${row[1]}">${row[1]}</option>`;
                });
            });

        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function loadData() {
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    let table = document.getElementById("historyTable");
                    table.innerHTML = "<tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th></tr>";
                    data.transactions.forEach((row, index) => {
                        if(index > 0 && row[0]) {
                            table.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`;
                        }
                    });
                });
        }

        function saveData() {
            let statusDiv = document.getElementById("status");
            statusDiv.innerText = "Saving...";
            
            let data = {
                action: 'add',
                sheetName: 'Sheet1',
                values: [
                    document.getElementById("date").value,
                    document.getElementById("type").value,
                    document.getElementById("categorySelect").value,
                    document.getElementById("itemSelect").value,
                    document.getElementById("amount").value
                ]
            };

            fetch(scriptURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(() => {
                statusDiv.innerText = "Success: Transaction saved!";
                setTimeout(() => statusDiv.innerText = "", 3000);
            })
            .catch(err => statusDiv.innerText = "Error: " + err);
        }
    </script>
</body>
</html>

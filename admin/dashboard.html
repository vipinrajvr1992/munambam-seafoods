<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Founder's Dashboard | The Gypsy Cartel</title>
    <style>
        :root { --navy-blue: #0B243B; --gold: #C5A059; --cream: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: var(--navy-blue); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .card { background: white; padding: 20px; border: 1px solid var(--gold); border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        
        /* Custom Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <h1>Founder's Dashboard</h1>
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
        <button onclick="showSection('settings')">Settings</button>
        <button onclick="showSection('logs')">View Logs</button> <!-- Always visible -->
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="modalMsg"></p>
            <button onclick="proceedAction()">Confirm</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <!-- Sections (Transactions, History, Logs, etc.) -->
    <div id="history" class="card">
        <h2>Transaction History <button onclick="loadData()">Refresh</button></h2>
        <table id="historyTable">
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>
        </table>
    </div>

    <script>
        let actionCallback = null;

        // Custom Confirm Function
        function customConfirm(msg, callback) {
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('confirmModal').style.display = 'flex';
            actionCallback = callback;
        }

        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }

        function proceedAction() {
            if(actionCallback) actionCallback();
            closeModal();
        }

        // Example Usage for Delete
        function deleteEntry(index) {
            customConfirm("ഈ ട്രാൻസാക്ഷൻ ഡിലീറ്റ് ചെയ്യണോ?", () => {
                console.log("Deleted index:", index);
                // API call here
            });
        }
        
        // ... rest of your functions
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Team - Munambam Seafoods</title>
    <style>
        :root { --navy-blue: #0B243B; --gold: #C5A059; --cream: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: var(--navy-blue); color: white; border: none; padding: 10px 15px; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        button:hover { transform: scale(1.05); background: var(--gold); }
        .card { background: white; padding: 20px; border: 1px solid var(--gold); border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .income-row { background-color: #d4edda; }
        .expense-row { background-color: #f8d7da; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 5px; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <h1>Core Team - Munambam Seafoods</h1>
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
        <button onclick="showSection('logs')">View Logs</button>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="modalMsg"></p>
            <button onclick="executeAction()">Confirm</button>
            <button onclick="closeModal()" style="background:#666;">Cancel</button>
        </div>
    </div>

    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <input type="date" id="date">
        <select id="type"><option value="Income">Income</option><option value="Expense">Expense</option></select>
        <select id="categorySelect"></select>
        <select id="itemSelect"></select>
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="confirmSave()">Save Transaction</button>
    </div>

    <div id="history" class="card hidden">
        <h2>Transaction History <button onclick="init()">Refresh</button></h2>
        <table id="historyTable">
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>
        </table>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzz-UT6Jb0VtUg5LfBwcCsolaFZlL9USXPvJXoSaGYWDugHe2087IpbuJBbtOnZuC0S/exec";
        let rawData = [];
        let pendingAction = null;

        async function init() {
            let res = await fetch(scriptURL);
            let data = await res.json();
            rawData = data.transactions.slice(1);
            let cat = document.getElementById("categorySelect");
            let item = document.getElementById("itemSelect");
            cat.innerHTML = ""; item.innerHTML = "";
            data.settings.forEach(row => {
                if(row[0]) cat.innerHTML += `<option>${row[0]}</option>`;
                if(row[1]) item.innerHTML += `<option>${row[1]}</option>`;
            });
            renderTable();
        }

        function renderTable() {
            let table = document.getElementById("historyTable");
            table.innerHTML = "<tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>";
            rawData.forEach((row, index) => {
                let rowClass = row[1] === 'Income' ? 'income-row' : 'expense-row';
                table.innerHTML += `<tr class="${rowClass}">
                    <td>${new Date(row[0]).toLocaleDateString('en-GB')}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td>
                    <td>
                        <button onclick="editEntry(${index})">Edit</button>
                        <button onclick="deleteEntry(${index})">Delete</button>
                    </td>
                </tr>`;
            });
        }

        function deleteEntry(index) {
            customConfirm("Are you sure you want to delete this entry?", () => {
                fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: 'Delete', sheetName: 'Sheet1', index: index + 1 }) })
                .then(() => { logAction("Delete", "Index: " + index); init(); });
            });
        }

        function editEntry(index) {
            let newAmount = prompt("Enter new amount:");
            if(newAmount) {
                customConfirm("Confirm Edit?", () => {
                    let row = rawData[index];
                    row[4] = newAmount;
                    fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: 'Edit', sheetName: 'Sheet1', index: index + 1, values: row }) })
                    .then(() => { logAction("Edit", "Index: " + index); init(); });
                });
            }
        }

        function logAction(action, details) {
            fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: 'add', sheetName: 'Logs', values: [new Date().toLocaleString(), action, details, navigator.userAgent] }) });
        }

        function customConfirm(msg, callback) {
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('confirmModal').style.display = 'flex';
            pendingAction = callback;
        }

        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }
        function executeAction() { if(pendingAction) pendingAction(); closeModal(); }

        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        
        init();
    </script>
</body>
</html>

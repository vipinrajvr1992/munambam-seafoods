<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Team - Munambam Seafoods</title>
    <style>
        :root { --navy-blue: #0B243B; --gold: #C5A059; --cream: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: var(--navy-blue); color: white; border: none; padding: 10px 15px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--gold); }
        .card { background: white; padding: 20px; border: 1px solid var(--gold); border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 300px; text-align: center; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Core Team - Munambam Seafoods</h1>
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="modalMsg">Are you sure?</p>
            <button onclick="executeAction()">Confirm</button>
            <button onclick="closeModal()" style="background:#666;">Cancel</button>
        </div>
    </div>

    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <input type="date" id="date">
        <select id="type"><option value="Income">Income</option><option value="Expense">Expense</option></select>
        <select id="categorySelect"></select>
        <select id="itemSelect"></select>
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="prepareSave()">Save Transaction</button>
    </div>

    <div id="history" class="card hidden">
        <h2>Transaction History <button onclick="init()">Refresh</button></h2>
        <table id="historyTable">
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>
        </table>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwfzRxGkq2pDcgCAp6EKTJx7n_Y2g-vtWgEpJ00p2WlD_NCCJPj3vDY4U3K8q01rdrN/exec";
        let pendingAction = null;
        let actionData = null;

        async function init() {
            let res = await fetch(scriptURL);
            let data = await res.json();
            
            // Dropdowns
            let cat = document.getElementById("categorySelect");
            let item = document.getElementById("itemSelect");
            cat.innerHTML = ""; item.innerHTML = "";
            data.settings.forEach(row => {
                if(row[0]) cat.innerHTML += `<option>${row[0]}</option>`;
                if(row[1]) item.innerHTML += `<option>${row[1]}</option>`;
            });

            // History Table
            let table = document.getElementById("historyTable");
            table.innerHTML = "<tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>";
            data.transactions.slice(1).forEach((row, index) => {
                table.innerHTML += `<tr>
                    <td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td>
                    <td>
                        <button onclick="prepareEdit(${index + 2})">Edit</button> 
                        <button onclick="prepareDelete(${index + 2})">Delete</button>
                    </td>
                </tr>`;
            });
        }

        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Modal Helpers
        function showModal(msg, callback, data) {
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('confirmModal').style.display = 'block';
            pendingAction = callback;
            actionData = data;
        }
        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }
        function executeAction() { pendingAction(actionData); closeModal(); }

        // Actions
        function prepareSave() {
            let data = { action: 'add', sheetName: 'Sheet1', values: [document.getElementById('date').value, document.getElementById('type').value, document.getElementById('categorySelect').value, document.getElementById('itemSelect').value, document.getElementById('amount').value] };
            showModal("Save this transaction?", sendData, data);
        }

        function prepareDelete(index) {
            showModal("Delete this entry?", sendData, { action: 'Delete', sheetName: 'Sheet1', index: index });
        }

        function prepareEdit(index) {
            let newAmount = prompt("Enter new amount:");
            if(newAmount) {
                showModal("Confirm edit?", sendData, { action: 'Edit', sheetName: 'Sheet1', index: index, values: [/* Add date/type/etc here if needed */ "","", "", "", newAmount] });
            }
        }

        function sendData(data) {
            fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }).then(() => init());
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Munambam Seafoods</title>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- Inline Loader & Fallback Modal CSS to guarantee layout works -->
    <style>
        /* Loader Overlay Style */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(11, 36, 59, 0.6);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--gold, #C5A059);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==========================================
           CUSTOM THEMING & ANIMATIONS (VIPIN'S SPEC)
           ========================================== */

        /* --- Income & Expense Badge Styles --- */
        .badge-income {
            background-color: #2ecc71 !important; /* Green Fill */
            color: #000000 !important;            /* Black Font */
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            font-size: 13px;
        }

        .badge-expense {
            background-color: #e74c3c !important; /* Red Fill */
            color: #000000 !important;            /* Black Font */
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            font-size: 13px;
        }

        /* --- Custom Error Toast (Yellow Fill, Red Text) --- */
        .toast.error, #toast.error {
            background-color: #ffeb3b !important; /* Yellow Fill */
            color: #c0392b !important;            /* Red Text */
            border-left: 6px solid #d32f2f !important;
            border-top: 1px solid #f1c40f !important;
            border-bottom: 1px solid #f1c40f !important;
            border-right: 1px solid #f1c40f !important;
            box-shadow: 0 8px 24px rgba(241, 196, 15, 0.3) !important;
        }

        /* --- Premium Button Animations (Navy to Black / Zoom In & Out) --- */
        .btn-primary, .btn-confirm, .btn-logout, .nav button {
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }

        /* Hover: Changes from Navy Blue to Black with White Text + Zoom In */
        .btn-primary:hover, .btn-confirm:hover, .btn-logout:hover, .nav button:hover {
            background-color: #000000 !important; 
            color: #FFFFFF !important;
            border-color: #000000 !important;
            transform: scale(1.05) !important; /* Zoom In */
            cursor: pointer;
        }

        /* Active: Zoom Out on Click */
        .btn-primary:active, .btn-confirm:active, .btn-logout:active, .nav button:active {
            transform: scale(0.95) !important; /* Zoom Out */
        }

        /* Table Action Buttons Zoom */
        .btn-edit, .btn-delete {
            transition: all 0.2s ease-in-out !important;
        }
        .btn-edit:hover, .btn-delete:hover {
            transform: scale(1.1) !important;
        }
        .btn-edit:active, .btn-delete:active {
            transform: scale(0.9) !important;
        }
    </style>
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Loader Overlay -->
    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="loader-spinner"></div>
    </div>

    <header class="navbar">
        <div class="logo">Munambam Seafoods</div>
        <div class="user-info">
            <span id="loggedUser">Admin</span>
            <button class="btn-logout" onclick="showConfirm('Are you sure you want to logout?', logout)">Logout</button>
        </div>
    </header>

    <nav class="nav">
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('addTransaction')">Add Transaction</button>
        <button onclick="showSection('history')">History</button>
        <button onclick="showSection('auditLogs')">Audit Logs</button>
        <button onclick="exportToExcel()">Export Excel</button>
    </nav>

    <main>
        <!-- Sections -->
        <section id="dashboard" class="card">
            <div class="summary-cards">
                <div class="card-item"><h3>Total Income</h3><p id="totalIncome">₹ 0</p></div>
                <div class="card-item"><h3>Total Expense</h3><p id="totalExpense">₹ 0</p></div>
                <div class="card-item"><h3>Net Profit</h3><p id="netProfit">₹ 0</p></div>
            </div>
            <button onclick="refreshDashboard()" class="btn-primary">Refresh Data</button>
        </section>

        <section id="addTransaction" class="card hidden">
            <h2>Add New Entry</h2>
            <div class="input-group">
                <input type="date" id="date">
                <select id="type"><option value="Income">Income</option><option value="Expense">Expense</option></select>
                <select id="categorySelect"><option value="">Select Category</option></select>
                <select id="itemSelect"><option value="">Select Item</option></select>
                <input type="number" id="amount" placeholder="Amount">
                <textarea id="notes" placeholder="Notes"></textarea>
                <button id="saveBtn" class="btn-primary" onclick="saveTransaction()">Save Transaction</button>
            </div>
        </section>

        <section id="history" class="card hidden">
            <h2>History</h2>
            <div class="filters">
                <input type="text" id="searchHistory" placeholder="Search History..." onkeyup="filterHistory()">
            </div>
            <table>
                <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Action</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </section>

        <section id="auditLogs" class="card hidden">
            <h2>Audit Logs</h2>
            <table>
                <thead><tr><th>Timestamp</th><th>Action</th><th>Details</th></tr></thead>
                <tbody id="auditBody"></tbody>
            </table>
        </section>
    </main>

    <!-- Custom Modal for Confirmation (Delete/Logout) -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content-confirm">
            <h3>Confirm Action</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
                <button class="btn-confirm" id="confirmActionBtn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Custom Modal for Edit (Replaces Browser Prompt) -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content-confirm">
            <h3>Edit Amount</h3>
            <p style="font-size: 14px; margin-bottom: 15px; color: #555;">Enter the updated amount below:</p>
            <input type="number" id="editAmountInput" placeholder="New Amount" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #EEE; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; outline: none;">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-confirm" id="confirmEditBtn" onclick="saveEditAmount()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" style="display: none;"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/export.js"></script>

    <script>
        // Section Switching
        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Custom Confirmation Modal Controller
        function showConfirm(message, onConfirm) {
            document.getElementById("confirmMessage").innerText = message;
            document.getElementById("confirmModal").style.display = "block";
            document.getElementById("confirmActionBtn").onclick = () => { onConfirm(); closeConfirm(); };
        }
        function closeConfirm() { 
            document.getElementById("confirmModal").style.display = "none"; 
        }

        // Custom Edit Modal Controller
        function closeEditModal() {
            document.getElementById("editModal").style.display = "none";
        }
    </script>
</body>
</html>

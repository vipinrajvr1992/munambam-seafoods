<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Munambam Seafoods</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- SheetJS for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <!-- Navigation -->
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
        <button onclick="showSection('auditLogs')">Audit Logs</button>
        <button onclick="exportExcel()">Export Excel</button>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="modalMsg">Are you sure?</p>
            <button onclick="executeAction()">Confirm</button>
            <button onclick="closeModal()" style="background:#666;">Cancel</button>
        </div>
    </div>

    <!-- Add Entry Section -->
    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <input type="date" id="date">
        <select id="type"><option value="Income">Income</option><option value="Expense">Expense</option></select>
        <select id="categorySelect"></select>
        <select id="itemSelect"></select>
        <input type="number" id="amount" placeholder="Amount">
        <button id="saveBtn" onclick="saveTransaction()">Save Transaction</button>
    </div>

    <!-- History Section -->
    <div id="history" class="card hidden">
        <h2>Transaction History <button onclick="refreshDashboard()">Refresh</button></h2>
        <table id="historyTable">
            <thead>
                <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th><th>Actions</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <!-- Audit Logs Section -->
    <div id="auditLogs" class="card hidden">
        <h2>Audit Logs</h2>
        <table id="auditTable">
            <thead>
                <tr><th>Timestamp</th><th>Action</th><th>Details</th><th>Browser</th></tr>
            </thead>
            <tbody id="auditBody"></tbody>
        </table>
    </div>

    <!-- Loader & Toast -->
    <div id="loader" class="hidden">Processing...</div>
    <div id="toast" class="hidden"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/history.js"></script>
    <script src="js/export.js"></script>
    <script src="js/audit.js"></script>
    
    <script>
        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Team - Munambam Seafoods</title>
    <style>
        :root { --navy-blue: #0B243B; --gold: #C5A059; --cream: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: var(--navy-blue); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        button:hover { background: var(--gold); }
        .card { background: white; padding: 20px; border: 1px solid var(--gold); border-radius: 5px; margin-top: 10px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>Core Team - Munambam Seafoods</h1>
    <div class="nav">
        <button onclick="showSection('transactions')">Add Transaction</button>
        <button onclick="showSection('history')">History & Filter</button>
    </div>

    <div id="transactions" class="card">
        <h2>Add New Entry</h2>
        <select id="categorySelect"><option value="">Select Category</option></select>
        <select id="itemSelect"><option value="">Select Item</option></select>
        <button onclick="alert('Save functionality pending implementation')">Save</button>
    </div>

    <div id="history" class="card hidden">
        <h2>Transaction History <button onclick="fetchData()">Refresh</button></h2>
        <table id="historyTable">
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th></tr>
        </table>
    </div>

    <script>
        // പുതിയ Script URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbzz-UT6Jb0VtUg5LfBwcCsolaFZlL9USXPvJXoSaGYWDugHe2087IpbuJBbtOnZuC0S/exec";

        async function fetchData() {
            try {
                let res = await fetch(scriptURL);
                let data = await res.json();
                
                // ഡ്രോപ്പ്‌ഡൗൺ അപ്‌ഡേറ്റ് ചെയ്യുന്നു
                let catSelect = document.getElementById("categorySelect");
                let itemSelect = document.getElementById("itemSelect");
                
                // ഡാറ്റ ലഭിച്ചാൽ മാത്രം ലൂപ്പ് ചെയ്യുക
                if (data.settings) {
                    data.settings.forEach(row => {
                        if(row[0]) catSelect.innerHTML += `<option>${row[0]}</option>`;
                        if(row[1]) itemSelect.innerHTML += `<option>${row[1]}</option>`;
                    });
                }

                // ഹിസ്റ്ററി ടേബിൾ അപ്‌ഡേറ്റ് ചെയ്യുന്നു
                if (data.transactions) {
                    let table = document.getElementById("historyTable");
                    table.innerHTML = "<tr><th>Date</th><th>Type</th><th>Category</th><th>Item</th><th>Amount</th></tr>";
                    data.transactions.forEach(row => {
                        table.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`;
                    });
                }
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        function showSection(id) {
            document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        fetchData();
    </script>
</body>
</html>
